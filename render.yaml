services:
  - type: web
    name: loto-backend
    env: node
    region: frankfurt
    plan: free
    rootDir: loto-backend
    buildCommand: npm install && npm run build
    startCommand: node dist/main.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false

  - type: web
    name: loto-frontend
    env: node
    region: frankfurt
    plan: free
    rootDir: loto-frontend
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        sync: false
      - key: NEXT_PUBLIC_SOCKET_URL
        sync: false
      - key: NODE_VERSION
        value: 20
