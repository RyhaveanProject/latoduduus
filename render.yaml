services:
  - type: web
    name: loto-backend
    env: node
    region: frankfurt
    plan: free
    rootDir: loto-backend
    buildCommand: npm install && npm run build
    # FIX: tsconfig-paths/register əlavə edildi — path alias-ları resolve edir
    startCommand: node -r tsconfig-paths/register dist/main.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: JWT_EXPIRATION
        value: 1h
      - key: JWT_REFRESH_EXPIRATION
        value: 7d

  - type: web
    name: loto-frontend
    env: node
    region: frankfurt
    plan: free
    rootDir: loto-frontend
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_VERSION
        value: 20
      # FIX: backend URL birbaşa burada təyin edilir.
      # "sync: false" dəyərsiz boş buraxırdı, NEXT_PUBLIC_ dəyişkənlər
      # build zamanı koda baked-in olur — runtime-da dəyişmir.
      - key: NEXT_PUBLIC_API_URL
        value: https://latoduduus.onrender.com/api
      - key: NEXT_PUBLIC_SOCKET_URL
        value: https://latoduduus.onrender.com
