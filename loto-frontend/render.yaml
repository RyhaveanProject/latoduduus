services:
  - type: web
    name: loto-frontend
    env: node
    region: frankfurt
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://YOUR-BACKEND.onrender.com/api
      - key: NEXT_PUBLIC_SOCKET_URL
        value: https://YOUR-BACKEND.onrender.com
      - key: NODE_VERSION
        value: 20
